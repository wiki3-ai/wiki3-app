<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wiki3</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f8f9fa;
        color: #1a1a2e;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
      }

      .loader {
        text-align: center;
      }

      .loader h1 {
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 12px;
      }

      .loader p {
        font-size: 14px;
        color: #666;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e0e0e0;
        border-top-color: #0066cc;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 16px;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .error {
        color: #cc3300;
        display: none;
        margin-top: 16px;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="loader">
      <div class="spinner"></div>
      <h1>Wiki3</h1>
      <p>Loading wiki3.ai...</p>
      <p class="error" id="error-message"></p>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
